name: CI

# Disciplina del proyecto (3 gates bloqueantes):
#  - npx tsc --noEmit  → garantía de tipos correctos.
#  - npm test  → 215 tests (Vitest) cubren motor nutricional, planGenerator,
#                catálogos, lista de compras, notificaciones, digests semanales.
#  - npm run lint  → ESLint (0 errores, warnings permitidos por ahora).
#
# Triggers: push a cualquier branch y pull-requests hacia main.
# Vercel queda configurado en su UI para bloquear deploys si este workflow falla.

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Cancela ejecuciones anteriores cuando se pushea de nuevo al mismo branch.
# Ahorra minutos de runner y evita ver verdes obsoletos.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests + Typecheck + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps (frozen)
        run: npm ci --no-audit --prefer-offline

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Tests (Vitest)
        run: npm test
        env:
          # Forzar UTC en el runner para garantizar comportamiento idéntico al
          # de Vercel en producción. Importante para diasDesde() y otras
          # funciones sensibles a zona horaria.
          TZ: UTC

      - name: Lint (ESLint)
        # 0 errores permitidos. Warnings se reportan pero no bloquean (29 warnings
        # de tech debt pendiente: img elements, unused imports). Limpiar gradualmente.
        run: npm run lint
